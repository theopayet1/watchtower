# Configuration de la veille.
# Réglages globaux puis une entrée par catégorie. Tous les champs de source
# sont optionnels : si tu n'en mets pas, le collecteur correspondant est sauté.

max_per_source: 15        # nb max d'items récupérés par source et par catégorie
freshness_hours: 30       # on ignore ce qui est plus vieux que ça (RSS/NewsAPI/HN)

categories:

  ia:
    label: "🤖 Intelligence Artificielle"
    rss:                    # sources FRANÇAISES — aucune clé requise
      - https://www.actuia.com/feed/
      - https://www.lebigdata.fr/feed
    # hn_query: "AI OR LLM OR GPT"   # Hacker News = contenu ANGLAIS, décommente si tu le veux

  dev:
    label: "💻 Développement & Tech"
    rss:
      - https://www.numerama.com/feed/
      - https://next.ink/feed/
      - https://www.lemondeinformatique.fr/flux-rss/thematique/toutes-les-actualites/rss.xml
    # hn_query: "python OR rust OR javascript"   # contenu ANGLAIS
